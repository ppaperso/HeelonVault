name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-and-release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux build dependencies (GTK4/libadwaita/sqlite)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            desktop-file-utils \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libsqlite3-dev \
            libglib2.0-dev \
            libglib2.0-dev-bin

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Validate desktop entry
        run: desktop-file-validate heelonvault.desktop

      - name: Create release archive
        run: |
          rm -rf dist
          mkdir -p dist

          cp target/release/heelonvault dist/
          cp install.sh dist/
          cp install-core.sh dist/
          cp install-ubuntu.sh dist/
          cp install-rhel.sh dist/
          cp remove.sh dist/
          cp remove-core.sh dist/
          cp remove-ubuntu.sh dist/
          cp remove-rhel.sh dist/
          cp tests/smoke-test.sh dist/
          cp heelonvault.desktop dist/
          cp README.md dist/
          cp QUICKSTART.md dist/
          cp -r resources dist/
          (cd dist && sha256sum heelonvault > heelonvault.sha256)

          chmod +x dist/install.sh dist/install-ubuntu.sh dist/install-rhel.sh dist/remove.sh dist/remove-ubuntu.sh dist/remove-rhel.sh dist/heelonvault dist/smoke-test.sh

      - name: Smoke test packaged installer
        run: |
          set -euo pipefail
          ./dist/smoke-test.sh --install ./dist/install.sh

      - name: Pack and Checksum
        run: |
          set -euo pipefail
          tar -C dist -czf heelonvault-linux-x86_64.tar.gz .
          sha256sum heelonvault-linux-x86_64.tar.gz > heelonvault-linux-x86_64.tar.gz.sha256

      - name: Generate Artifact Attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: heelonvault-linux-x86_64.tar.gz

      - name: Publish GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          ASSET="heelonvault-linux-x86_64.tar.gz"
          CHECKSUM="${ASSET}.sha256"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ASSET" "$CHECKSUM" --clobber
          else
            gh release create "$TAG" "$ASSET" "$CHECKSUM" --prerelease --generate-notes
          fi
