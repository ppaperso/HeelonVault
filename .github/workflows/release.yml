name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux build dependencies (GTK4/libadwaita/sqlite)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libsqlite3-dev \
            libglib2.0-dev \
            libglib2.0-dev-bin

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --locked

      - name: Create release archive
        run: |
          rm -rf dist
          mkdir -p dist

          cp target/release/heelonvault dist/
          cp install.sh dist/
          cp README.md dist/
          cp QUICKSTART.md dist/

          chmod +x dist/install.sh
          chmod +x dist/heelonvault

          tar -C dist -czf heelonvault-linux-x86_64.tar.gz .

      - name: Publish GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          ASSET="heelonvault-linux-x86_64.tar.gz"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ASSET" --clobber
          else
            gh release create "$TAG" "$ASSET" --prerelease --generate-notes
          fi
