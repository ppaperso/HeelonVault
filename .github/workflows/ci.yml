name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  build-and-verify:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            desktop-file-utils \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libsqlite3-dev \
            libglib2.0-dev \
            libglib2.0-dev-bin

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --release --locked

      - name: Compile tests
        run: cargo test --locked --all-targets --no-run

      - name: Validate desktop entry
        run: desktop-file-validate heelonvault.desktop

      - name: Package dist
        run: |
          set -euo pipefail

          rm -rf dist
          mkdir -p dist
          cp target/release/heelonvault dist/
          cp install.sh dist/
          cp install-core.sh dist/
          cp install-ubuntu.sh dist/
          cp install-rhel.sh dist/
          cp remove.sh dist/
          cp remove-core.sh dist/
          cp remove-ubuntu.sh dist/
          cp remove-rhel.sh dist/
          cp tests/smoke-test.sh dist/
          cp heelonvault.desktop dist/
          cp README.md dist/
          cp QUICKSTART.md dist/
          cp -r resources dist/
          (cd dist && sha256sum heelonvault > heelonvault.sha256)
          chmod +x dist/install.sh dist/install-ubuntu.sh dist/install-rhel.sh dist/remove.sh dist/remove-ubuntu.sh dist/remove-rhel.sh dist/heelonvault dist/smoke-test.sh

      - name: Smoke test – install
        run: ./dist/smoke-test.sh --install ./dist/install.sh

      - name: Smoke test – uninstall
        run: ./dist/smoke-test.sh --remove ./dist/remove.sh

  build-and-verify-fedora:
    runs-on: ubuntu-24.04
    container: fedora:latest

    steps:
      - name: Install container bootstrap tools
        run: |
          dnf install -y \
            git \
            tar \
            gzip \
            coreutils \
            which

      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Fedora build dependencies
        run: |
          dnf install -y \
            gcc \
            desktop-file-utils \
            pkgconf-pkg-config \
            gtk4-devel \
            libadwaita-devel \
            sqlite-devel \
            glib2-devel \
            glib2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked

      - name: Validate desktop entry
        run: desktop-file-validate heelonvault.desktop

      - name: Package dist
        run: |
          set -euo pipefail

          rm -rf dist
          mkdir -p dist
          cp target/release/heelonvault dist/
          cp install.sh dist/
          cp install-core.sh dist/
          cp install-ubuntu.sh dist/
          cp install-rhel.sh dist/
          cp remove.sh dist/
          cp remove-core.sh dist/
          cp remove-ubuntu.sh dist/
          cp remove-rhel.sh dist/
          cp tests/smoke-test.sh dist/
          cp heelonvault.desktop dist/
          cp README.md dist/
          cp QUICKSTART.md dist/
          cp -r resources dist/
          (cd dist && sha256sum heelonvault > heelonvault.sha256)
          chmod +x dist/install.sh dist/install-ubuntu.sh dist/install-rhel.sh dist/remove.sh dist/remove-ubuntu.sh dist/remove-rhel.sh dist/heelonvault dist/smoke-test.sh

      - name: Smoke test – install (Fedora)
        run: ./dist/smoke-test.sh --install ./dist/install.sh

      - name: Smoke test – uninstall (Fedora)
        run: ./dist/smoke-test.sh --remove ./dist/remove.sh

  build-and-verify-windows:
    runs-on: windows-2025
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup MSYS2 and Windows build dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-rust
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-libadwaita
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-glib2

      - name: Verify MSYS2 toolchain
        run: |
          rustc --version
          cargo --version
          pkg-config --modversion gtk4
          pkg-config --modversion libadwaita-1

      - name: Build Windows release binary
        run: cargo build --release --locked

      - name: Verify Windows release binary exists
        run: test -f target/release/heelonvault.exe

      - name: Upload Windows binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: heelonvault-windows-x86_64-exe
          path: target/release/heelonvault.exe
