name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  build-and-verify:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            desktop-file-utils \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libsqlite3-dev \
            libglib2.0-dev \
            libglib2.0-dev-bin

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --release --locked

      - name: Compile tests
        run: cargo test --locked --all-targets --no-run

      - name: Validate desktop entry
        run: desktop-file-validate heelonvault.desktop

      - name: Smoke test installer
        run: |
          set -euo pipefail

          rm -rf dist
          mkdir -p dist
          cp target/release/heelonvault dist/
          cp install.sh dist/
          cp heelonvault.desktop dist/
          cp README.md dist/
          cp QUICKSTART.md dist/
          cp -r resources dist/
          chmod +x dist/install.sh dist/heelonvault

          sudo ./dist/install.sh

          test -x /opt/heelonvault/heelonvault
          test -x /opt/heelonvault/run.sh
          test -f /usr/share/applications/com.heelonvault.rust.desktop
          test -f /usr/share/applications/heelonvault.desktop
          desktop-file-validate /usr/share/applications/com.heelonvault.rust.desktop
          desktop-file-validate /usr/share/applications/heelonvault.desktop
